<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 - 失物招领系统</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f8f9fa;}
.sidebar{height:100vh;background:#4158D0;color:white;position:fixed;width:250px;padding:20px;}
.content{margin-left:250px;padding:30px;}
.logout-btn{position:absolute;bottom:30px;left:20px;right:20px;}
</style>
</head>
<body>
<div class="sidebar">
    <h4 class="mb-4"><i class="bi bi-shield-lock"></i> 管理后台</h4>
    <a href="admin.html" class="btn btn-primary w-100 mb-2">数据总览</a>
    <a href="list.html" class="btn btn-outline-light w-100">返回前台</a>
    <button class="btn btn-outline-light logout-btn w-100" onclick="logoutAdmin()">退出登录</button>
</div>

<div class="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>失物招领数据管理</h3>
        <span class="text-success"><i class="bi bi-check-circle"></i> 管理员已登录</span>
    </div>

    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm bg-primary text-white">
                <div class="card-body"><h5>总发布量</h5><h1 class="mt-2" id="totalCount">0</h1></div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm bg-success text-white">
                <div class="card-body"><h5>已找回</h5><h1 class="mt-2" id="doneCount">0</h1></div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm bg-danger text-white">
                <div class="card-body"><h5>寻找中</h5><h1 class="mt-2" id="ingCount">0</h1></div>
            </div>
        </div>
    </div>

    <h5>所有物品管理</h5>
    <div id="adminList"></div> <!-- 关键容器 -->

    <hr class="my-4">
    <h5>⚖️ 用户申诉管理</h5>
    <div id="appealList"></div> <!-- 关键容器 -->
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
