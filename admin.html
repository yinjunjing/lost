<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>管理后台</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-light py-4">
<div class="container max-w-md mx-auto">
  <div class="d-flex justify-content-between mb-3">
    <h5>🛠️ 管理后台</h5>
    <button onclick="logoutAdmin()" class="btn btn-sm btn-outline-danger">退出</button>
  </div>

  <div class="row text-center mb-3 g-2">
    <div class="col-4">
      <div class="card p-2">总<br><span id="total">0</span></div>
    </div>
    <div class="col-4">
      <div class="card p-2">已找回<br><span id="ok">0</span></div>
    </div>
    <div class="col-4">
      <div class="card p-2">寻找中<br><span id="ing">0</span></div>
    </div>
  </div>

  <ul class="nav nav-tabs mb-3">
    <li class="nav-item"><button class="nav-link active" onclick="showPanel('items')">物品</button></li>
    <li class="nav-item"><button class="nav-link" onclick="showPanel('appeals')">申诉</button></li>
  </ul>

  <div id="itemsPanel">
    <div id="adminList" class="mb-4"></div>
  </div>
  <div id="appealsPanel" class="d-none">
    <div id="appealList"></div>
  </div>
</div>

<script>
function showPanel(type){
  if(type==='items'){
    document.getElementById('itemsPanel').classList.remove('d-none');
    document.getElementById('appealsPanel').classList.add('d-none');
  }else{
    document.getElementById('itemsPanel').classList.add('d-none');
    document.getElementById('appealsPanel').classList.remove('d-none');
  }
}
</script>
<script src="app.js"></script>
</body>
</html>
