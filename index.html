<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>发布信息</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-light py-4">
<div class="container max-w-md mx-auto">
  <h5 class="mb-3">📝 发布寻物/招领</h5>
  <form id="publishForm" class="card p-3 shadow-sm border-0">
    <select id="type" class="form-select mb-2" required>
      <option value="lost">寻物</option>
      <option value="found">招领</option>
    </select>
    <input id="title" class="form-control mb-2" placeholder="物品名称" required>
    <textarea id="desc" class="form-control mb-2" rows="3" placeholder="详细描述" required></textarea>
    <input id="contact" class="form-control mb-2" placeholder="联系方式" required>
    <input id="secret" type="password" class="form-control mb-2" placeholder="设置删除密钥" required>
    <input id="fileInput" type="file" class="form-control mb-3" accept="image/*">
    <button class="btn btn-primary w-100" type="submit">发布</button>
  </form>
  <div class="mt-3 text-center">
    <a href="index.html" class="btn btn-sm btn-outline-secondary">返回首页</a>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
