<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>校园失物招领系统</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-light">

<div class="container py-4">
    <div class="text-center mb-4">
        <h3>🎓 校园失物招领系统</h3>
        <p class="text-muted">安全、便捷、免费使用</p>
    </div>

    <!-- 功能图标介绍 -->
    <div class="row g-3 mb-5 text-center">
        <div class="col-4">
            <div class="card p-3 h-100">
                <h5>📝</h5>
                <p class="small mb-0">发布寻物/招领</p>
            </div>
        </div>
        <div class="col-4">
            <div class="card p-3 h-100">
                <h5>🔍</h5>
                <p class="small mb-0">查看所有信息</p>
            </div>
        </div>
        <div class="col-4">
            <div class="card p-3 h-100">
                <h5>📷</h5>
                <p class="small mb-0">支持上传图片</p>
            </div>
        </div>
        <div class="col-4">
            <div class="card p-3 h-100">
                <h5>⚙️</h5>
                <p class="small mb-0">删除密钥保护</p>
            </div>
        </div>
        <div class="col-4">
            <div class="card p-3 h-100">
                <h5>🛡️</h5>
                <p class="small mb-0">违禁词自动过滤</p>
            </div>
        </div>
        <div class="col-4">
            <div class="card p-3 h-100">
                <h5>📊</h5>
                <p class="small mb-0">管理后台统计</p>
            </div>
        </div>
    </div>

    <div class="d-grid gap-2">
        <a href="publish.html" class="btn btn-primary btn-lg">我要发布</a>
        <a href="list.html" class="btn btn-success btn-lg">查看列表</a>
        <button onclick="adminLogin()" class="btn btn-dark btn-lg">管理后台</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
