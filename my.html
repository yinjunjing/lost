<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>个人中心</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-light py-4">
<div class="container max-w-md mx-auto">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5>👤 个人中心</h5>
    <a href="index.html" class="btn btn-sm btn-outline-secondary">首页</a>
  </div>

  <div class="card p-3 mb-3">
    <p class="mb-1">查看你发布过的失物招领信息，并可凭删除密钥管理</p>
  </div>

  <div class="mb-3">
    <input id="mySecret" type="password" class="form-control" placeholder="输入你设置的删除密钥查询我的发布">
  </div>
  <button onclick="loadMyItems()" class="btn btn-primary w-100 mb-4">查询我的物品</button>

  <div id="myItemsList"></div>
</div>

<script>
async function loadMyItems() {
  const key = document.getElementById('mySecret').value.trim();
  if (!key) {
    alert('请输入删除密钥');
    return;
  }

  const { data, error } = await supabase
    .from('items')
    .select('*')
    .eq('secret', key)
    .order('created_at', { ascending: false });

  const dom = document.getElementById('myItemsList');
  if (error) {
    dom.innerHTML = '<div class="alert alert-danger">加载失败</div>';
    return;
  }
  if (data.length === 0) {
    dom.innerHTML = '<div class="alert alert-info">暂无你发布的物品</div>';
    return;
  }

  let html = '';
  data.forEach(i => {
    html += `
    <div class="card mb-3 shadow-sm">
      ${i.img_url ? `<img src="${i.img_url}" class="card-img-top" style="height:160px;object-fit:cover">` : ''}
      <div class="card-body p-3">
        <h6>${i.type == 'lost' ? '[寻物]' : '[招领]'} ${i.title}</h6>
        <p class="small text-muted">${i.description}</p>
        <p class="small">状态：${i.status}</p>
        <button class="btn btn-sm btn-danger w-100" onclick="delMyItem(${i.id})">删除</button>
      </div>
    </div>`;
  });
  dom.innerHTML = html;
}

async function delMyItem(id) {
  if (!confirm('确定删除该物品？')) return;
  await supabase.from('items').delete().eq('id', id);
  alert('删除成功');
  loadMyItems();
}
</script>
<script src="app.js"></script>
</body>
</html>
