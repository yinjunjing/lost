<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>发布信息</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark" style="background:#4158D0">
<div class="container">
<a class="navbar-brand" href="index.html"><i class="bi bi-search-heart me-2"></i>失物招领</a>
<div class="navbar-nav ms-auto">
<a class="nav-link" href="index.html">首页</a>
<a class="nav-link" href="list.html">物品列表</a>
<a class="nav-link active" href="publish.html">我要发布</a>
<a class="nav-link" href="my.html">我的发布</a>
</div>
</div>
</nav>

<div class="container py-5">
<div class="row justify-content-center">
<div class="col-md-8 col-lg-6">
<div class="card shadow border-0 rounded-3">
<div class="card-header bg-primary text-white rounded-top">
<h5 class="mb-0"><i class="bi bi-plus-circle me-2"></i>发布失物/寻物</h5>
</div>
<div class="card-body p-4">
<form id="publishForm">
<div class="mb-3">
<label class="form-label">类型</label>
<select id="type" class="form-control" required>
<option value="lost">寻物（我丢了）</option>
<option value="found">失物（我捡到）</option>
</select>
</div>
<div class="mb-3">
<label class="form-label">物品名称</label>
<input type="text" id="title" class="form-control" required>
</div>
<div class="mb-3">
<label class="form-label">物品描述</label>
<textarea id="desc" class="form-control" rows="3" required></textarea>
<button type="button" class="btn btn-outline-primary btn-sm mt-2 w-100" onclick="aiGenerateDesc()">🧠 AI 自动生成描述</button>
</div>
<div class="mb-3">
<label class="form-label">上传图片</label>
<input type="file" id="fileInput" class="form-control" accept="image/*">
<button type="button" class="btn btn-outline-success btn-sm mt-2 w-100" onclick="aiDetectImage()">🧠 AI 识别图片物品</button>
</div>
<div class="mb-3">
<label class="form-label">联系方式</label>
<input type="text" id="contact" class="form-control" required>
</div>
<div class="mb-3">
<label class="form-label">删除密钥（不公开）</label>
<input type="password" id="secret" class="form-control" required placeholder="设置密码，用于删除">
</div>
<button type="submit" class="btn btn-primary w-100">发布信息</button>
</form>
</div>
</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
